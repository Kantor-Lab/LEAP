joy_node:
  ros__parameters:
    dev: "/dev/input/js0"
    deadzone: 0.15
    autorepeat_rate: 20.0

teleop_twist_joy_node:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 0.7
    scale_linear_turbo:
      x: 1.5

    axis_angular:
      yaw: 0
    scale_angular:
      yaw: 0.4
    scale_angular_turbo:
      yaw: 1.5

    require_enable_button: True
    enable_button: 5
    enable_turbo_button: 4